<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{{highlightCssUri}}">
        <style>
            html, body {
                height: 100%;
                margin: 0;
                padding: 0;
                font-family: var(--vscode-font-family);
                font-size: var(--vscode-font-size);
                color: var(--vscode-editor-foreground);
                background: var(--vscode-editor-background);
            }

            .chat-container {
                display: flex;
                flex-direction: column;
                height: 100%;
                border: 1px solid var(--vscode-editorWidget-border);
                border-radius: 8px;
                overflow: hidden;
                box-sizing: border-box;
            }

            .chat-messages {
                flex: 1;
                padding: 12px;
                overflow-y: auto;
            }

            .message {
                margin: 8px 0;
                padding: 10px 14px;
                border-radius: 6px;
                line-height: 1.4;
                font-size: 13px;
            }

            .user {
                background: var(--vscode-editorWidget-background);
                border: 1px solid var(--vscode-editorWidget-border);
                align-self: flex-end;
            }

            .assistant {
                background: var(--vscode-input-background);
                border: 1px solid var(--vscode-input-border);
                align-self: flex-start;
            }

            .chat-input {
                border-top: 1px solid var(--vscode-editorWidget-border);
                padding: 8px;
                background: var(--vscode-editorWidget-background);
            }

            .input-wrapper {
                position: relative;
                display: flex;
                flex-direction: column;
                flex: 1;
                border: 1px solid var(--vscode-input-border);
                background: var(--vscode-input-background);
                border-radius: 4px;
                padding: 6px 10px;
            }

            .chat-input textarea {
                width: 100%;
                padding: 0;
                border: none;
                background: transparent;
                color: var(--vscode-input-foreground);
                outline: none;
                resize: none;
                min-height: calc(2 * 1.4em);
                max-height: 100px;
                overflow-y: auto;
                line-height: 1.4;
            }

            .chat-input textarea:focus {
                border-color: transparent;
                box-shadow: none;
            }

            .input-wrapper:focus-within {
                border-color: var(--vscode-focusBorder);
                box-shadow: 0 0 0 1px var(--vscode-focusBorder);
            }

            .chat-input textarea:disabled {
                color: var(--vscode-disabledForeground);
                opacity: 0.6;
                cursor: not-allowed;
            }

            .input-wrapper.waiting {
                opacity: 0.7;
            }

            .input-loading-indicator {
                display: none;
                gap: 3px;
                align-items: center;
                position: absolute;
                top: 25%;
                left: 10px;
                pointer-events: none;
                z-index: 10;
            }

            .input-loading-indicator.visible {
                display: flex;
            }

            .loading-text {
                font-size: 12px;
                color: var(--vscode-input-placeholderForeground);
                margin-left: 4px;
            }

            .typing-indicator .loading-text {
                font-size: 13px;
            }

            .chat-controls {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding-top: 8px;
            }

            #modelSelector {
                width: min-content;
                margin-right: 8px;
                background-color: var(--vscode-input-background);
                color: var(--vscode-input-foreground);
                border: none;
                border-radius: 4px;
                padding: 4px;
                position: relative;
            }

            .dropdown-label {
                display: flex;
                align-items: center;
                cursor: pointer;
            }

            .action-label {
                display: flex;
                align-items: center;
                color: var(--vscode-input-placeholderForeground);
            }

            .action-label:hover {
                color: var(--vscode-list-hoverForeground);
            }

            .chat-model-label {
                margin-right: 2px;
                white-space: nowrap;
            }

            .dropdown-content {
                display: none;
                position: absolute;
                bottom: 100%;
                left: 0;
                background-color: var(--vscode-editorWidget-background);
                border: 1px solid var(--vscode-editorWidget-border);
                border-radius: 4px;
                padding: 4px;
                min-width: 200px;
            }

            .dropdown-content a {
                color: var(--vscode-editor-foreground);
                padding: 4px 8px;
                text-decoration: none;
                display: block;
            }

            .dropdown-content a:hover {
                background-color: var(--vscode-list-hoverBackground);
            }

            .empty-chat {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                text-align: center;
                color: var(--vscode-input-placeholderForeground);
            }

            .empty-chat svg {
                width: 128px;
                height: 128px;
                margin-bottom: 16px;
                color: var(--vscode-input-placeholderForeground); /* Use foreground color for the icon */
            }

            .empty-chat p {
                font-size: 28px;
                margin: 0;
            }

            .send-icon {
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                color: var(--vscode-input-placeholderForeground); /* Color for the icon, matching placeholder */
                padding: 0;
                background: transparent;
            }

            .send-icon:hover {
                color: var(--vscode-button-hoverBackground);
            }

            .chevron-down {
                vertical-align: middle;
                margin-left: 2px;
            }

            /* Optional: Add transition for interactive feedback */
            .action-label[aria-expanded="true"] .chevron-down {
                transform: rotate(180deg);
            }

            .action-label .chevron-down {
                transition: transform 0.2s ease;
            }

            @keyframes typingAnimation {
                0%, 60%, 100% { opacity: 0.3; }
                30% { opacity: 1; }
            }

            .typing-indicator {
                display: inline-flex;
                gap: 3px;
                align-items: center;
            }

            .typing-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background-color: var(--vscode-input-foreground);
                animation: typingAnimation 1.4s infinite;
            }

            .typing-dot:nth-child(2) {
                animation-delay: 0.2s;
            }

            .typing-dot:nth-child(3) {
                animation-delay: 0.4s;
            }

            .message.assistant.loading {
                opacity: 0.8;
            }

            .reasoning-container {
                margin-bottom: 4px;
                padding: 6px 8px;
                background: var(--vscode-textBlockQuote-background);
                border-radius: 4px;
                font-size: 12px;
                border-left: 2px solid var(--vscode-textBlockQuote-border);
            }

            .reasoning-header {
                display: flex;
                align-items: center;
                cursor: pointer;
                color: var(--vscode-descriptionForeground);
                user-select: none;
                font-size: 12px;
                letter-spacing: 0.5px;
                padding: 2px 0;
            }

            .reasoning-header:hover {
                color: var(--vscode-foreground);
            }

            .reasoning-content {
                display: block;
                font-style: italic;
                opacity: 0.9;
                padding-top: 0;
            }

            .reasoning-content.collapsed {
                display: none;
            }

            .reasoning-toggle-icon {
                margin-right: 6px;
                transition: transform 0.2s;
                display: flex;
                align-items: center;
                margin-top: -2px; /* Pull up to align with text center */
            }

            .reasoning-toggle-icon.collapsed {
                transform: rotate(-90deg);
            }

            .tool-call-container {
                margin-top: 8px;
                margin-bottom: 8px;
                border: 1px solid var(--vscode-textSeparator-foreground);
                border-radius: 4px;
                overflow: hidden;
            }

            .tool-call-container details {
                padding: 4px 8px;
                background: var(--vscode-textBlockQuote-background);
            }

            .tool-call-container summary {
                cursor: pointer;
                font-size: 12px;
                user-select: none;
                color: var(--vscode-descriptionForeground);
                list-style: none; /* Hide default arrow */
                display: flex;
                align-items: center;
            }

            .tool-call-container summary::-webkit-details-marker {
                display: none; /* Hide default arrow for Safari */
            }

            .tool-call-container summary:hover {
                color: var(--vscode-foreground);
            }

            .tool-call-status-icon {
                margin-right: 6px;
                font-size: 14px;
                display: flex;
                align-items: center;
            }

            .tool-call-container pre {
                margin: 6px 0 0 0;
                padding: 6px;
                background: var(--vscode-editor-background);
                border-radius: 3px;
                font-size: 11px;
                overflow-x: auto;
                font-family: var(--vscode-editor-font-family, monospace);
                color: var(--vscode-editor-foreground);
            }

            .tool-name {
                font-weight: bold;
                color: var(--vscode-symbolIcon-functionForeground);
            }

            .tool-confirmation-container {
                margin: 8px 0;
                padding: 10px;
                background: var(--vscode-editorWidget-background);
                border: 1px solid var(--vscode-editorWidget-border);
                border-radius: 6px;
                font-size: 13px;
            }

            .tool-confirmation-header {
                display: flex;
                align-items: center;
                margin-bottom: 8px;
                color: var(--vscode-foreground);
                font-weight: 500;
            }

            .tool-confirmation-icon {
                margin-right: 8px;
                color: var(--vscode-notificationsInfoIcon-foreground);
            }

            .tool-confirmation-buttons {
                display: flex;
                gap: 8px;
                margin-top: 10px;
                justify-content: center;
            }

            .tool-button {
                padding: 6px 16px;
                border-radius: 2px;
                cursor: pointer;
                font-size: 12px;
                border: none;
                min-width: 80px;
                max-width: 150px;
                text-align: center;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .tool-button-primary {
                background: var(--vscode-button-background);
                color: var(--vscode-button-foreground);
            }

            .tool-button-primary:hover {
                background: var(--vscode-button-hoverBackground);
            }

            .tool-button-secondary {
                background: var(--vscode-button-secondaryBackground);
                color: var(--vscode-button-secondaryForeground);
            }

            .tool-button-secondary:hover {
                background: var(--vscode-button-secondaryHoverBackground);
            }

            .tool-button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
        </style>
    </head>
    <body>
        <div class="chat-container">
            <div class="chat-messages" id="chat">
                <div class="empty-chat" id="emptyChatContent">
                    <svg width="92px" height="96px" viewBox="0 1 92 97" xmlns="http://www.w3.org/2000/svg">
                        <title>Suggestio Icon</title>
                        <g fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 12 C4 6 12 4 20 4 L72 4 C80 4 88 6 88 12 L88 70 C88 78 80 80 72 80 L50 80 L32 94 L36 80 L20 80 C12 80 4 78 4 70 Z"
                                stroke="currentColor" stroke-width="6"/>

                            <g transform="translate(32,29) scale(2)">
                                <path d="M5 17 H9 M5.6667 19.5 H8.3333" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M2.41 11.68 L3.51 12.72 C3.82 13.01 4 13.42 4 13.84 C4 14.48 4.52 15 5.16 15 H8.84 C9.48 15 10 14.48 10 13.84 C10 13.42 10.18 13.01 10.49 12.72 L11.59 11.68 C13.13 10.22 13.99 8.30 14 6.30 L14 6.22 C14 2.81 10.87 0 7 0 C3.13 0 0 2.81 0 6.22 L0 6.30 C0.01 8.30 0.87 10.22 2.41 11.68 Z" 
                                    stroke="currentColor" stroke-width="1.5"/>
                            </g>

                            <line x1="46" y1="20" x2="46" y2="15" stroke="currentColor" stroke-width="4"/>
                            <line x1="36" y1="24" x2="31" y2="18" stroke="currentColor" stroke-width="4"/>
                            <line x1="56" y1="24" x2="61" y2="18" stroke="currentColor" stroke-width="4"/>
                        </g>
                    </svg>
                    <p>Chat with Suggestio</p>
                </div>
            </div>
            <div class="chat-input">
                <div class="input-wrapper">
                    <div class="input-loading-indicator" id="inputLoadingIndicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <span class="loading-text">Working...</span>
                    </div>
                    <textarea id="messageInput" placeholder="Type a request..."></textarea>
                    <div class="chat-controls">
                        <div id="modelSelector">
                            <div class="dropdown-label">
                                <a class="action-label" role="button" aria-haspopup="true" aria-expanded="false">
                                    <span class="chat-model-label"></span>
                                    <svg class="chevron-down" width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                                        <path fill="currentColor" d="M7.976 10.072l4.357-4.357.62.618L8.284 11h-.618L3 6.333l.619-.618 4.357 4.357z"/>
                                    </svg>
                                </a>
                            </div>
                            <div class="dropdown-content"></div>
                        </div>
                        <div class="send-icon" onclick="ChatManager.sendMessage()">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <script>
            const models = {{models}};
            const activeModel = '{{activeModel}}';
        </script>
        <script src="{{scriptUri}}"></script>
        <script>
            const vscode = acquireVsCodeApi();

            const SEND_ICON_HTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="12" x2="7" y2="12"></line><polygon points="22 12 2 2 7 12 2 22 22 12"></polygon></svg>';
            const STOP_ICON_HTML = '<span style="font-size: 28px; font-weight: bold; line-height: 1;">■</span>';

            /**
             * Base class for a message segment (e.g., Reasoning, Content, ToolCall).
             */
            class MessageSegment {
                constructor(container, type) {
                    this.container = container;
                    this.type = type;
                    this.element = document.createElement('div');
                    this.container.appendChild(this.element);
                }
                append(text) { /* override */ }
                update(data) { /* override */ }
            }

            class ReasoningSegment extends MessageSegment {
                constructor(container) {
                    super(container, 'reasoning');
                    this.element.className = 'reasoning-container';
                    this.element.innerHTML = `
                        <div class="reasoning-header" onclick="ChatManager.toggleReasoning(event)">
                            <span class="reasoning-toggle-icon">
                                <svg width="14" height="14" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                                    <path fill="currentColor" d="M7.976 10.072l4.357-4.357.62.618L8.284 11h-.618L3 6.333l.619-.618 4.357 4.357z"/>
                                </svg>
                            </span>
                            <span>Thought Process</span>
                        </div>
                        <div class="reasoning-content"></div>
                    `;
                    this.contentElement = this.element.querySelector('.reasoning-content');
                    this.toggleIcon = this.element.querySelector('.reasoning-toggle-icon');
                    this.internalSegments = [];
                    this.lastInternalTokenType = null;
                }

                append(text) {
                    if (this.lastInternalTokenType !== 'content' || !this.internalSegments.length) {
                        const seg = new ContentSegment(this.contentElement);
                        this.internalSegments.push(seg);
                    }
                    this.internalSegments[this.internalSegments.length - 1].append(text);
                    this.lastInternalTokenType = 'content';
                }

                addToolCall(payload) {
                    const seg = new ToolCallSegment(this.contentElement, payload);
                    this.internalSegments.push(seg);
                    this.lastInternalTokenType = 'tool_call';
                    return seg;
                }

                addConfirmation(payload) {
                    const seg = new ConfirmationSegment(this.contentElement, payload);
                    this.internalSegments.push(seg);
                    this.lastInternalTokenType = 'confirmation';
                    return seg;
                }

                collapse() {
                    if (!this.contentElement.classList.contains('collapsed')) {
                        this.contentElement.classList.add('collapsed');
                        this.toggleIcon.classList.add('collapsed');
                    }
                }
            }

            class ContentSegment extends MessageSegment {
                constructor(container) {
                    super(container, 'content');
                    this.contentText = '';
                    this.element.className = 'message-content';
                }

                append(text) {
                    this.contentText += text;
                    this.element.innerHTML = window.renderMarkdown(this.contentText);
                }
            }

            class ToolCallSegment extends MessageSegment {
                constructor(container, payload) {
                    super(container, 'tool_call');
                    this.toolCallId = payload.toolCallId;
                    this.toolName = payload.toolName;
                    this.displayMessage = payload.displayMessage || `Running <span class="tool-name">${payload.toolName}</span>...`;
                    this.element.className = 'tool-call-container';
                    this.element.id = 'tool-' + this.toolCallId;
                    
                    let prettyArgs = payload.args;
                    try {
                        prettyArgs = JSON.stringify(JSON.parse(payload.args), null, 2);
                    } catch (e) {}

                    this.element.innerHTML = `
                        <details open>
                            <summary>
                                <span class="tool-call-status-icon">⚙️</span>
                                <span class="tool-status-text">${this.displayMessage}</span>
                            </summary>
                            <pre>${prettyArgs}</pre>
                        </details>
                    `;
                    this.statusIcon = this.element.querySelector('.tool-call-status-icon');
                    this.statusText = this.element.querySelector('.tool-status-text');
                    this.details = this.element.querySelector('details');
                    this.pre = this.element.querySelector('pre');
                }

                update(payload) {
                    if (this.details) this.details.removeAttribute('open');
                    if (this.statusIcon) this.statusIcon.textContent = payload.success ? '✅' : '❌';
                    if (this.statusText) {
                        let message = payload.customMessage || this.displayMessage;
                        if (!message || message.includes('Running')) {
                            message = `Used <span class="tool-name">${payload.toolName}</span>`;
                        }
                        this.statusText.innerHTML = message.replace(/\.+$/, '');
                        if (!payload.success) {
                            this.statusText.style.color = 'var(--vscode-errorForeground)';
                        }
                    }
                    if (this.pre && payload.result) {
                        this.pre.textContent = payload.result;
                    }
                }
            }

            class ConfirmationSegment extends MessageSegment {
                constructor(container, payload) {
                    super(container, 'confirmation');
                    this.toolCallId = payload.toolCallId;
                    this.element.className = 'tool-confirmation-container';
                    this.element.id = 'confirm-' + this.toolCallId;
                    this.element.innerHTML = `
                        <div class="tool-confirmation-header">
                            <span class="tool-confirmation-icon">ℹ️</span>
                            <span>Tool Request</span>
                        </div>
                        <div class="tool-confirmation-message">${payload.message}</div>
                        ${payload.diffData ? `
                            <div style="margin-top: 8px;">
                                <button class="tool-button tool-button-secondary" style="width: 100%; max-width: none;" onclick="ChatManager.viewDiff('${payload.toolCallId}')">🔍 View Diff</button>
                            </div>
                        ` : ''}
                        <div class="tool-confirmation-buttons">
                            <button class="tool-button tool-button-primary" onclick="ChatManager.confirmTool('${payload.toolCallId}', 'allow')">Allow</button>
                            <button class="tool-button tool-button-secondary" onclick="ChatManager.confirmTool('${payload.toolCallId}', 'deny')">Deny</button>
                        </div>
                    `;
                }
            }

            /**
             * Represents a single assistant response message.
             */
            class AssistantMessage {
                constructor(container) {
                    this.container = container;
                    this.element = document.createElement('div');
                    this.element.className = 'message assistant loading';
                    this.element.innerHTML = `
                        <div class="typing-indicator">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <span class="loading-text">Working...</span>
                        </div>
                        <div class="segments"></div>
                    `;
                    this.segmentsContainer = this.element.querySelector('.segments');
                    this.indicator = this.element.querySelector('.typing-indicator');
                    this.container.appendChild(this.element);
                    this.segments = [];
                    this.toolCalls = new Map();
                    this.activeReasoningSegment = null;
                    this.lastTokenType = null;
                    this.isStreaming = true;
                    this.element.scrollIntoView();
                }

                appendToken(text, tokenType) {
                    if (tokenType === 'reasoning') {
                        if (!this.activeReasoningSegment) {
                            this.activeReasoningSegment = new ReasoningSegment(this.segmentsContainer);
                            this.segments.push(this.activeReasoningSegment);
                        }
                        this.activeReasoningSegment.append(text);
                    } else {
                        // content
                        if (this.activeReasoningSegment) {
                            this.activeReasoningSegment.collapse();
                            this.activeReasoningSegment = null;
                        }
                        if (this.lastTokenType !== 'content' || !this.segments.length) {
                            const seg = new ContentSegment(this.segmentsContainer);
                            this.segments.push(seg);
                        }
                        this.segments[this.segments.length - 1].append(text);
                    }
                    this.lastTokenType = tokenType;
                }

                addToolCall(payload) {
                    let segment;
                    if (this.activeReasoningSegment) {
                        segment = this.activeReasoningSegment.addToolCall(payload);
                    } else {
                        segment = new ToolCallSegment(this.segmentsContainer, payload);
                        this.segments.push(segment);
                    }
                    this.toolCalls.set(payload.toolCallId, segment);
                    this.lastTokenType = 'tool_call';
                    segment.element.scrollIntoView();
                }

                updateToolCall(payload) {
                    const segment = this.toolCalls.get(payload.toolCallId);
                    if (segment) {
                        segment.update(payload);
                    }
                }

                addConfirmation(payload) {
                    let segment;
                    if (this.activeReasoningSegment) {
                        segment = this.activeReasoningSegment.addConfirmation(payload);
                    } else {
                        segment = new ConfirmationSegment(this.segmentsContainer, payload);
                        this.segments.push(segment);
                    }
                    this.lastTokenType = 'confirmation';
                    segment.element.scrollIntoView();
                }

                finish() {
                    this.isStreaming = false;
                    this.element.classList.remove('loading');
                    this.element.style.opacity = '1';
                    if (this.indicator) this.indicator.remove();
                    
                    // Cleanup if message is completely empty (can happen on errors)
                    const hasContent = this.segments.some(s => {
                        if (s.type === 'content') return s.contentText.trim().length > 0;
                        if (s.type === 'reasoning') {
                            return s.internalSegments.some(is => {
                                if (is.type === 'content') return is.contentText.trim().length > 0;
                                return true; // tools count as content
                            });
                        }
                        return true; // tool calls, etc
                    });
                    if (!hasContent) {
                        this.element.remove();
                    }
                }
            }

            /**
             * Main Chat Manager to handle all interactions and state.
             */
            const ChatManager = {
                chatContainer: null,
                messageInput: null,
                currentAssistantMessage: null,
                lastUserMessageElement: null,

                init() {
                    this.chatContainer = document.getElementById('chat');
                    this.messageInput = document.getElementById('messageInput');
                    this.messageInput.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            this.sendMessage();
                        }
                    });
                    this.messageInput.addEventListener('input', () => this.adjustTextareaHeight());
                    this.adjustTextareaHeight();
                    this.messageInput.focus();

                    window.addEventListener('focus', () => {
                        setTimeout(() => this.messageInput.focus(), 50);
                    });

                    this.setupModelSelector();
                },

                setupModelSelector() {
                    const modelSelector = document.getElementById('modelSelector');
                    const dropdownLabel = modelSelector.querySelector('.dropdown-label');
                    const dropdownContent = modelSelector.querySelector('.dropdown-content');
                    const chatModelLabel = modelSelector.querySelector('.chat-model-label');
                    const sendIcon = document.querySelector('.send-icon');

                    sendIcon.innerHTML = SEND_ICON_HTML;
                    chatModelLabel.textContent = activeModel;

                    models.forEach(model => {
                        const option = document.createElement('a');
                        option.href = '#';
                        option.textContent = model;
                        option.addEventListener('click', (e) => {
                            e.preventDefault();
                            chatModelLabel.textContent = model;
                            dropdownContent.style.display = 'none';
                            vscode.postMessage({ command: 'modelChanged', model });
                        });
                        dropdownContent.appendChild(option);
                    });

                    dropdownLabel.addEventListener('click', () => {
                        dropdownContent.style.display = dropdownContent.style.display === 'block' ? 'none' : 'block';
                    });

                    document.addEventListener('click', (e) => {
                        if (!modelSelector.contains(e.target)) {
                            dropdownContent.style.display = 'none';
                        }
                    });
                },

                sendMessage() {
                    const text = this.messageInput.value.trim();
                    if (!text) return;

                    const emptyChatContent = document.getElementById('emptyChatContent');
                    if (emptyChatContent) emptyChatContent.style.display = 'none';

                    this.appendUserMessage(text);
                    this.messageInput.value = '';
                    this.adjustTextareaHeight();
                    
                    this.currentAssistantMessage = new AssistantMessage(this.chatContainer);
                    this.disableInput();
                    
                    vscode.postMessage({ command: 'sendMessage', text });
                },

                appendUserMessage(text) {
                    const msg = document.createElement('div');
                    msg.className = 'message user';
                    msg.innerText = text;
                    this.chatContainer.appendChild(msg);
                    this.lastUserMessageElement = msg;
                    msg.scrollIntoView();
                },

                appendStaticAssistantMessage(text) {
                    const msg = document.createElement('div');
                    msg.className = 'message assistant';
                    const content = document.createElement('div');
                    content.className = 'message-content';
                    content.innerHTML = window.renderMarkdown(text);
                    msg.appendChild(content);
                    this.chatContainer.appendChild(msg);
                    msg.scrollIntoView();
                },

                disableInput() {
                    this.messageInput.disabled = true;
                    this.messageInput.placeholder = '';
                    const wrapper = document.querySelector('.input-wrapper');
                    const sendIcon = document.querySelector('.send-icon');
                    const indicator = document.getElementById('inputLoadingIndicator');
                    
                    wrapper.classList.add('waiting');
                    sendIcon.onclick = () => vscode.postMessage({ command: 'cancelRequest' });
                    sendIcon.innerHTML = STOP_ICON_HTML;
                    indicator.classList.add('visible');
                },

                enableInput() {
                    this.messageInput.disabled = false;
                    this.messageInput.placeholder = 'Type a request...';
                    const wrapper = document.querySelector('.input-wrapper');
                    const sendIcon = document.querySelector('.send-icon');
                    const indicator = document.getElementById('inputLoadingIndicator');
                    
                    wrapper.classList.remove('waiting');
                    sendIcon.onclick = () => this.sendMessage();
                    sendIcon.innerHTML = SEND_ICON_HTML;
                    indicator.classList.remove('visible');
                },

                adjustTextareaHeight() {
                    this.messageInput.style.height = 'auto';
                    this.messageInput.style.height = this.messageInput.scrollHeight + 'px';
                },

                newChat() {
                    const messages = this.chatContainer.querySelectorAll('.message, .tool-call-container, .tool-confirmation-container');
                    messages.forEach(m => m.remove());
                    const emptyChatContent = document.getElementById('emptyChatContent');
                    if(emptyChatContent) emptyChatContent.style.display = 'flex';
                    this.currentAssistantMessage = null;
                },

                confirmTool(toolCallId, decision) {
                    const container = document.getElementById('confirm-' + toolCallId);
                    if (container) container.remove();
                    vscode.postMessage({ command: 'confirmToolCall', toolCallId, decision });
                },

                viewDiff(toolCallId) {
                    vscode.postMessage({ command: 'viewDiff', toolCallId });
                },

                toggleReasoning(event) {
                    const header = event.currentTarget;
                    const container = header.parentElement;
                    const content = container.querySelector('.reasoning-content');
                    const icon = header.querySelector('.reasoning-toggle-icon');
                    const isCollapsed = content.classList.toggle('collapsed');
                    icon.classList.toggle('collapsed', isCollapsed);
                }
            };

            document.addEventListener('DOMContentLoaded', () => ChatManager.init());

            window.addEventListener('message', event => {
                const { sender, type, text, tokenType, command } = event.data;
                console.log('Message received:', { sender, type, tokenType, command, textLength: text?.length });

                if (command === 'newChat') {
                    ChatManager.newChat();
                    return;
                }

                if (sender === 'assistant') {
                    if (type === 'token') {
                        if (!ChatManager.currentAssistantMessage || !ChatManager.currentAssistantMessage.isStreaming) {
                            ChatManager.currentAssistantMessage = new AssistantMessage(ChatManager.chatContainer);
                        }
                        ChatManager.currentAssistantMessage.appendToken(text, tokenType);
                        
                        // Smart scroll
                        if (ChatManager.lastUserMessageElement) {
                            const rect = ChatManager.lastUserMessageElement.getBoundingClientRect();
                            if (rect.top > 25) ChatManager.chatContainer.scrollTop += 20;
                        }
                    } else if (type === 'tool_start') {
                        if (!ChatManager.currentAssistantMessage || !ChatManager.currentAssistantMessage.isStreaming) {
                            ChatManager.currentAssistantMessage = new AssistantMessage(ChatManager.chatContainer);
                        }
                        ChatManager.currentAssistantMessage.addToolCall(event.data);
                    } else if (type === 'tool_end') {
                        if (ChatManager.currentAssistantMessage) {
                            ChatManager.currentAssistantMessage.updateToolCall(event.data);
                        }
                    } else if (type === 'tool_confirmation') {
                        if (!ChatManager.currentAssistantMessage || !ChatManager.currentAssistantMessage.isStreaming) {
                            ChatManager.currentAssistantMessage = new AssistantMessage(ChatManager.chatContainer);
                        }
                        ChatManager.currentAssistantMessage.addConfirmation(event.data);
                    } else if (type === 'completion') {
                        if (ChatManager.currentAssistantMessage) {
                            ChatManager.currentAssistantMessage.finish();
                        }
                        ChatManager.enableInput();
                    } else {
                        // Error or static message
                        ChatManager.enableInput();
                        if (ChatManager.currentAssistantMessage) ChatManager.currentAssistantMessage.finish();
                        ChatManager.appendStaticAssistantMessage(text);
                    }
                } else if (sender === 'user') {
                    ChatManager.appendUserMessage(text);
                }
            });
        </script>
    </body>
</html>
